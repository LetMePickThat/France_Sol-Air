<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond bleu DSFR -->
  <rect width="32" height="32" fill="#000091"/>
  <!-- Bande tricolore 10 px : 4 bleu / 3 blanc / 3 rouge -->
  <rect x="0" y="0" width="4" height="32" fill="#002395"/>
  <rect x="4" y="0" width="3" height="32" fill="#FFFFFF"/>
  <rect x="7" y="0" width="3" height="32" fill="#E1000F"/>
  <!-- Radar : centre (21, 26) dans les 22 px restants -->
  <path d="M16,26 A5,5 0 0,1 26,26"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M13,26 A8,8 0 0,1 29,26"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Balayage à ~45° -->
  <line x1="21" y1="26" x2="27" y2="19"
        stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Point central -->
  <circle cx="21" cy="26" r="2" fill="#FFFFFF"/>
</svg>
